#version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RUNPOD_API_URL=${RUNPOD_API_URL:-}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY:-}
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

